exclude: |
  (?x)^(
      src/os/freertos/freertos(-plus)?/.*\.[c|h]|
      src/os/freertos/freertos(-plus)?/.*\.url|
      src/os/freertos/freertos(-plus)?/.*\.github/.*|
      src/os/freertos/freertos(-plus)?/.*include/.*|
      src/os/freertos/freertos(-plus)?/.*portable/.*|
      src/os/freertos/freertos(-plus)?/.*History\.txt|
      src/os/freertos/freertos(-plus)?/.*LICENSE\.md|
      src/os/freertos/freertos(-plus)?/.*README\.md|
      src/os/freertos/freertos(-plus)?/.*readme\.txt|
      src/os/freertos/freertos(-plus)?/.*GettingStarted\.md|
      tests/hil/server/pi_pico/fault_injector/mcp23017\.py|
      tools/dbc/third-party/.*|
      tools/waf
  )$
repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
        name: check hooks apply to the repository
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
        files: |
          (?x)^(
            .*\.py|
            .*wscript
          )$
      - id: check-builtin-literals
        files: |
          (?x)^(
            .*\.py|
            .*wscript
          )$
      - id: check-case-conflict
      - id: check-docstring-first
        files: |
          (?x)^(
            .*\.py|
            .*wscript
          )$
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-yaml
        # .gitlab/ci_pipeline/build_app_embedded.yml --> duplicate key - but its not
        exclude: |
          (?x)^(
            \.gitlab/ci_pipeline/build_app_embedded\.yml|
            \.gitlab/ci_pipeline/build\.ccs\.yml|
            \.gitlab/ci_pipeline/build_embedded\.yml|
            tests/cli/cmd_plot/test_execution/test_yaml_error.yaml
          )$
        args: [ --allow-multiple-documents ]
      - id: debug-statements
        files: |
          (?x)^(
            .*(\.py)|
            .*wscript
          )$
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-submodules
      - id: mixed-line-ending
        args: [ --fix=no ]
        exclude: |
          (?x)^(
            tests/cli/pre_commit_scripts/test_check_doxygen/invalid-encoding_utf-16\.c|
            tests/cli/pre_commit_scripts/test_check_encoding/utf-16\.txt|
            tests/cli/pre_commit_scripts/test_check_for_tabs/tabs_2\.txt
          )$
      - id: name-tests-test
        args: [ --unittest ]
        exclude: |
          (?x)^(
            tests/can/check_ids\.py|
            tests/can/check_implemented\.py|
            tests/ccs/ccs_build_helper\.py|
            tests/cli/pre_commit_scripts/test_check_license_info/valid-license\.py|
            tests/c-std/c-std-test\.py|
            tests/dbc/check_parseable\.py|
            tests/dbc/overlapping-signals\.py|
            tests/hil/.*\.py
          )$
      - id: no-commit-to-branch
        args: [ --branch, master ]
      - id: pretty-format-json
        args: [ --indent, "2", --no-sort-keys, --autofix ]
        exclude: |
          (?x)^(
            .*\.(ipynb)
          )$
      - id: requirements-txt-fixer
      - id: trailing-whitespace
        exclude: (?x)^( .*\.(dil)| .*\.(patch)|
          src/app/driver/afe/nxp/(common/)?mc3377.*/vendor/.*\.[c|h]|
          tests/fox-cmds/etl/test.DTA )$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff-check
        args: [ --fix ]
        exclude: |
          (?x)^(
            .*(\.ipynb)
          )$
      - id: ruff
        name: ruff-import-order
        args: [ check, --fix, --select, I ]
        exclude: |
          (?x)^(
            .*(\.ipynb)|
            tools/waf-tools/.*|
            tools/waf
          )$
      - id: ruff-format
        exclude: |
          (?x)^(
            .*(\.ipynb)
          )$
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade
        files: |
          (?x)^(
            .*(\.py)|
            .*wscript
          )$
  - repo: local
    hooks:
      - id: forbidden-file-types
        name: check file types
        language: fail
        entry: Forbidden file types based on file extension
        files: ".*\\.(xlsx|docx|vsdx)"
  - repo: local
    hooks:
      - id: check-file-name
        name: check file names
        entry: file names must be alphanumeric and lower-case
        language: fail
        files: "[^a-z0-9._/-]"
        exclude: |
          (?x)^(
            .*README(\.foxbms)?\.md|
            \.github/ISSUE_TEMPLATE/general_issue\.md|
            \.github/PULL_REQUEST_TEMPLATE\.md|
            \.gitlab/CODEOWNERS|
            BSD-3-Clause\.txt|
            CC-BY-4\.0\.txt|
            CHANGELOG\.md|
            CITATION\.cff|
            INSTALL\.md|
            LICENSE\.md|
            src/app/driver/afe/nxp/mc3377.*/vendor/MC3377.*\.h|
            tests/unit/os/freertos/freertos-plus/freertos-plus-tcp/source/portable/NetworkInterface/tms570lc435/test_NetworkInterface.c|
            tests/fox-cmds/etl/test.DTA
          )$
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [ python ]
        files: |
          (?x)^(
            .*(\.py)|
            .*wscript
          )$
        require_serial: true
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        types: [ python ]
        language: system
        args:
          - ./cli/ # works on Linux and Windows
        pass_filenames: false
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: "v21.1.1"
    hooks:
      - id: clang-format
        args: [ --style=file ]
        types_or: [ c ]
        exclude: |
          (?x)^(
            tests/cli/pre_commit_scripts/test_check_doxygen/invalid-encoding_utf-16\.c
          )$
  - repo: local
    hooks:
      - id: check-license-header-bsd-3-clause
        name: check license header [BSD-3-Clause]
        exclude_types: [ binary, json, markdown, rst, svg ]
        exclude: |
          (?x)^(
            .*\.gitignore|
            .*\.gitattributes|
            .*\.dummy|
            .*\.drawio|
            .*\.clang-format|
            .*\.txt|
            .*/adi/.*/diag/.*|
            \.gitlab/.*|
            \.gitlab-ci\.yml|
            conf/unit/(app|bootloader)_project_(posix|win32)\.yml|
            conf/hcg/.*|
            docs/.*\.csv|
            docs/.*\.conf.in|
            docs/.*\.jsonl|
            docs/.*doxygen_layout\.xml|
            (src|tests/unit)/(app|bootloader)/hal/(app|bootloader)-hl_notification\.c|
            (src|tests/unit)/app/driver/emac/(test_)?emac(-low-level)?\.[c|h]|
            src/(app|bootloader)/main/(app|bootloader)\.cmd|
            src/app/driver/afe/nxp/common/mc3377x/nxp_mc3377x-ll\.[c|h]|
            src/bootloader/driver/crc/vendor/crc64_calc\.[c|h]|
            src/bootloader/main/intvecs(_init)?\.asm|
            src/app/driver/sbc/fs8x_driver/.*\.[c|h]|
            src/app/driver/afe/nxp/common/mc3377x/vendor/uc_msg_t\.[c|h]|
            src/app/driver/afe/nxp/mc3377\da/vendor/MC3377\dA\.h|
            src/app/driver/phy/dp83869\.[c|h]|
            src/app/driver/config/spi_cfg_.*\.c|
            (src|tests/unit)/(app|bootloader)/main/(test_)?fstartup\.c|
            (src|tests/unit)/(app|bootloader)/main/include/(test_)?fstartup\.h|
            tests/cli/pre_commit_scripts/test_check_cpp_style_comment/cpp-style-comment_\d\.c|
            tests/cli/pre_commit_scripts/test_check_cpp_style_comment/no-cpp-style-comment-link\.c|
            tests/cli/pre_commit_scripts/test_check_include_guard/test_file_invalid_content\.[c|h]|
            tests/cli/pre_commit_scripts/test_check_doxygen/invalid-encoding_utf-16\.c|
            tests/cli/pre_commit_scripts/test_check_license_info/invalid-license\.c|
            tests/cli/pre_commit_scripts/test_check_license_info/no-license\.c|
            tests/hil/.*|
            tools/dbc/.*|
            tools/waf-tools/crc64_ti_impl\.py
          )$
        language: system
        entry: python cli/pre_commit_scripts/check_license_info.py
          --license-type=BSD-3-Clause
      - id: check-license-header-confidential
        name: check license header [confidential]
        types: [ text ]
        exclude_types: [ binary, json, markdown ]
        exclude: |
