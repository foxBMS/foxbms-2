---
###############################################################################
# Note:                                                                       #
# This file is based on the 'project.yml' file created by                     #
# 'ceedling new --local tmp'                                                  #
###############################################################################
# Important:                                                                  #
# Paths must be given as seen from the build variant root directory           #
###############################################################################
:project:
  :which_ceedling: gem
  :ceedling_version: "?"
  :use_mocks: TRUE
  :use_exceptions: TRUE
  :use_test_preprocessor: :all
  :use_backtrace: :gdb
  :use_auxiliary_dependencies: TRUE
  :use_decorators: :auto
  :build_root: .
  :test_file_prefix: test_
  :default_tasks:
    - test:all
  :test_threads: 8
  :compile_threads: 8
  :release_build: FALSE

:mixins:
  :enabled: []
  :load_paths: []

:test_build:
  :use_assembly: FALSE

:plugins:
  :enabled:
    - module_generator
    - gcov
    - report_tests_log_factory
    - report_tests_pretty_stdout
    - report_tests_raw_output_log

:report_tests_log_factory:
  :reports:
    - json
    - junit
    - cppunit
    - html

:extension:
  :executable: .out

:paths:
  :test:
    - +:./../../tests/unit/bootloader/**
    # we do not need the main directory as there are no meaning full test
    # sources or headers in it.
    - -:./../../tests/unit/bootloader
    # helper headers that shall not be included
    - -:./../../tests/unit/bootloader/main/helper
    - -:./../../tests/unit/support
  :source:
    - +:./../../src/bootloader/**
  :include:
    - +:./include/** # HALCoGen
    - +:./../../src/bootloader/main/include
  :support:
    - +:./../../tests/unit/support/**
  :libraries: []
:files:
  :test:
    # this file can only be tested on Windows due to HALCoGen availability
    - -:./../../tests/unit/bootloader/main/test_fstartup.c
    # these files can only be tested on Windows due to Flash API availability
    - -:./../../tests/unit/bootloader/driver/config/test_flash_cfg.c
    - -:./../../tests/unit/bootloader/driver/flash/test_flash.c
    - -:./../../tests/unit/bootloader/engine/boot/test_boot.c
    - -:./../../tests/unit/bootloader/engine/boot/test_boot_helper.c
    - -:./../../tests/unit/bootloader/engine/can/test_can_cbs.c
    - -:./../../tests/unit/bootloader/main/test_main.c
  :source: []
:defines:
  :test: &config-test-defines
    :*: &match-all-tests
      - UNITY_UNIT_TEST
      - FAS_ASSERT_LEVEL=2
      - UNITY_INCLUDE_EXEC_TIME
      - _POSIX_C_SOURCE=200809L
    :/test_can_can_message_notification.c:
      - COMPILE_FOR_UNIT_TEST=1
  :preprocess:
    <<: *config-test-defines
    :*:
      - *match-all-tests

:flags:
  :test:
    :compile:
      :*:
        - -std=c11
        - -Wextra
        - -Wall
        - -pedantic
        - -include
        - test_ignore_list.h
        - -Werror

:cmock:
  :includes: []
  :plugins:
    - :callback
    - :return_thru_ptr
  :verbosity: 2
  :when_no_prototypes: :warn
  :mock_path: "./mocks"
  :skeleton_path: ""
  :mock_prefix: "Mock"
  :mock_suffix: ""
  :strippables: []
  :attributes:
    - __ramfunc
    - __irq
    - __fiq
    - register
    - extern
  :c_calling_conventions:
    - __stdcall
    - __cdecl
    - __fastcall
  :treat_externs: :include
  :treat_inlines: :exclude
  :treat_as:
    uint8: HEX8
    uint16: HEX16
    uint32: UINT32
    int8: INT8
    bool: UINT8
  :memcmp_if_unknown: true
  :when_ptr: :compare_data
  :weak: ""
  :enforce_strict_ordering: true
  :fail_on_unexpected_calls: true
  :callback_include_count: true
  :callback_after_arg_check: false
  :exclude_setjmp_h: false

:test_runner:
  :cmdline_args: true

:environment: []

:libraries:
  :placement: :end
  :flag: "-l${1}"
  :path_flag: "-L ${1}"
  :system: [m]
  :test: []
  :release: []

:gcov:
  :utilities:
    - gcovr
  :reports:
    - HtmlBasic
    - HtmlDetailed
    - Text
    - Cobertura

  :gcovr:
    :report_root: "../../"
    :report_exclude: ".*vendor.*|.*/build.*|.*test.*|.*tests.*|.*lib.*|.*Test.*|.*src.hal.*|.*src.app.*"
    :exclude_directories: ".*tests.*|.*/build.*"
    :sort_percentage: TRUE
    :sort_uncovered: FALSE
    :print_summary: TRUE
    :threads: 8
    :keep: FALSE
    :html_artifact_filename: GcovCoverageResults.html
    :html_title: foxBMS 2 Bootloader Test Coverage Report
    :html_medium_threshold: 75
    :html_high_threshold: 90
    :html_absolute_paths: FALSE
    :html_encoding: UTF-8
    :merge_mode_function: merge-use-line-min

:tools:
  :test_linker:
    :executable: gcc
    :arguments:
      - ${1}
      - ${5}
      - -o ${2}
      - ${4}
      - -flto
  :gcov_linker:
    :executable: gcc
    :arguments:
      - ${1}
      - ${5}
      - -o ${2}
      - ${4}
      - -lgcov
      - --coverage
      - -flto
