---
###############################################################################
# Note:                                                                       #
# This file is based on the 'project.yml' file created by                     #
# 'ceedling new --local tmp'                                                  #
###############################################################################
# Important:                                                                  #
# Paths must be given as seen from the build variant root directory           #
###############################################################################
:project:
  :which_ceedling: gem
  :ceedling_version: "?"
  :use_mocks: TRUE
  :use_exceptions: TRUE
  :use_test_preprocessor: :all
  :use_backtrace: :gdb
  :use_auxiliary_dependencies: TRUE
  :use_decorators: :auto
  :build_root: .
  :test_file_prefix: test_
  :default_tasks:
    - test:all
  :test_threads: 8
  :compile_threads: 8
  :release_build: FALSE

:mixins:
  :enabled: []
  :load_paths: []

:test_build:
  :use_assembly: FALSE

:plugins:
  :enabled:
    - module_generator
    - gcov
    - command_hooks
    - report_tests_log_factory
    - report_tests_pretty_stdout
    - report_tests_raw_output_log

:report_tests_log_factory:
  :reports:
    - json
    - junit
    - cppunit
    - html

:extension:
  :executable: .out

:paths:
  :test:
    - +:./../../tests/unit/app/**
    - +:./../../tests/unit/os/freertos/freertos-plus/freertos-plus-tcp/source/portable/NetworkInterface/tms570lc435/**
    # we do not need the main directory as there are no meaning full test
    # sources or headers in it.
    - -:./../../tests/unit/app
    # see tests/unit/app/driver/afe/adi/common/ades183x/README.md why this
    # directory is excluded
    - -:./../../tests/unit/app/driver/afe/adi/common/ades183x/**
    # see tests/unit/app/driver/afe/nxp/common/mc3377x/README.md why this
    # directory is excluded
    - -:./../../tests/unit/app/driver/afe/nxp/common/mc3377x/**
    # helper headers that shall not be included
    - -:./../../tests/unit/app/main/helper
    - -:./../../tests/unit/app/driver/afe/adi/ades1830/include
    - -:./../../tests/unit/support
  :source:
    - +:./../../src/app/**
    - +:./../../src/os/freertos/freertos-plus/freertos-plus-tcp/source/portable/NetworkInterface/tms570lc435/**
  :include:
    - +:./ # see mock.py why this is needed
    - +:./include/** # HALCoGen
    - +:./../../src/os/freertos/freertos/include
    - +:./../../src/os/freertos/freertos/portable/ccs/arm_cortex-r5
    - +:./../../src/app/main/include
    - +:./../../src/app/application/config # see marker 'CONFIG'
    - +:./../../src/app/engine/config
    - +:./../../src/app/engine/database
    - +:./../../src/app/driver/mcu
    - +:./../../src/app/task/os
    # 'CONFIG': configuration of the battery system for the unit test build
    # (see file battery_system_cfg_unit_test.h)
    - +:./../../tests/unit/app/application/config
  :support:
    - +:./../../tests/unit/support/**
  :libraries: []

:files:
  :test:
    # this file can only be tested on Windows due to HALCoGen availability
    - -:./../../tests/unit/app/main/test_fstartup.c
  :source: []

:defines:
  :test: &config-test-defines
    :*: &match-all-tests
      - UNITY_UNIT_TEST
      - FAS_ASSERT_LEVEL=2
      - UNITY_INCLUDE_EXEC_TIME
      - FOXBMS_RTOS_FREERTOS=1
      - _POSIX_C_SOURCE=200809L
    :/test_adi_ad*.c:
      - FOXBMS_AFE_DRIVER_TYPE_NO_FSM=1
    :/test_adi_ades1830.*/:
      - FOXBMS_AFE_DRIVER_ADI=1u
      - FOXBMS_AFE_DRIVER_ADI_ADES1830=1u
      - TEST_BS_NR_OF_CELL_BLOCKS_PER_MODULE=16u
    :/test_bms.c/:
      - TEST_BS_NR_OF_STRINGS=2u
    :/test_debug_default.*/:
      - FOXBMS_AFE_DRIVER_DEBUG=1u
    :/test_debug_can.*/:
      - TEST_BS_NR_OF_STRINGS=2u
      - TEST_BS_NR_OF_MODULES_PER_STRING=4u
    :/test_ltc_.*/:
      - FOXBMS_AFE_DRIVER_LTC=1u
      - TEST_BS_NR_OF_CELL_BLOCKS_PER_MODULE=18u
    :/test_mxm.*/:
      - FOXBMS_AFE_DRIVER_MAXIM=1u
      - TEST_BS_NR_OF_CELL_BLOCKS_PER_MODULE=14u
    :/test_nxp_afe.*/: # this test is independent of the used AFE
      - FOXBMS_AFE_DRIVER_NXP=1u
    :/test_nxp_mc3377*a*.c:
      - FOXBMS_AFE_DRIVER_TYPE_NO_FSM=1
    :/test_nxp_mc33775a.*/:
      - FOXBMS_AFE_DRIVER_NXP=1u
      - FOXBMS_AFE_DRIVER_NXP_MC33775A
      - TEST_BS_NR_OF_CELL_BLOCKS_PER_MODULE=14u
      - TEST_BS_NR_OF_TEMP_SENSORS_PER_MODULE=16u
    :/test_st_.*/:
      - FOXBMS_AFE_DRIVER_ST=1u
      - TEST_BS_NR_OF_CELL_BLOCKS_PER_MODULE=18u
    :/test_ti_.*/:
      - FOXBMS_AFE_DRIVER_TI=1u
      - TEST_BS_NR_OF_CELL_BLOCKS_PER_MODULE=18u
    :/test_spi_adi.c:
      - FOXBMS_AFE_DRIVER_ADI=1u
    :/test_spi_debug.c:
      - FOXBMS_AFE_DRIVER_DEBUG=1u
    :/test_spi_ltc.c:
      - FOXBMS_AFE_DRIVER_LTC=1u
    :/test_spi_mxm.c:
      - FOXBMS_AFE_DRIVER_MAXIM=1u
    :/test_spi_nxp.c:
      - FOXBMS_AFE_DRIVER_NXP=1u
    :/test_spi_st.c:
      - FOXBMS_AFE_DRIVER_ST=1u
    :/test_spi_ti.c:
      - FOXBMS_AFE_DRIVER_TI=1u
    :/test_can_can_message_notification.c:
      - COMPILE_FOR_UNIT_TEST=1
    :/test_spi_spi_notification.c:
      - COMPILE_FOR_UNIT_TEST=1
    :/test_uart_sci_notification.c:
      - COMPILE_FOR_UNIT_TEST=1
      - FOXBMS_UART_SUPPORT=1
    :/test_can_cbs_rx_afe_cell-temperatures.c:
      - FOXBMS_AFE_DRIVER_DEBUG_CAN=1u
    :/test_can_cbs_rx_afe_cell-voltages.c:
      - FOXBMS_AFE_DRIVER_DEBUG_CAN=1u
    :/test_can_cbs_tx_f_string.*/:
      - TEST_BS_NR_OF_STRINGS=2u
    :/test_can_cbs_tx_f_pack-minimum-maximum-values.c:
      - TEST_BS_NR_OF_STRINGS=2u
    :/test_can_cbs_tx_f_pack-state-estimation.c:
      - TEST_BS_NR_OF_STRINGS=2u
    :/test_can_cbs_tx_f_cell-temperatures_1-temp-sensor.c:
      - TEST_BS_NR_OF_TEMP_SENSORS=1u
    :/test_can_cbs_tx_f_cell-temperatures_3-temp-sensors.c:
      - TEST_BS_NR_OF_TEMP_SENSORS=3u
    :/test_can_cbs_tx_f_cell-temperatures_4-temp-sensors.c:
      - TEST_BS_NR_OF_TEMP_SENSORS=4u
    :/test_can_cbs_tx_f_cell-temperatures_5-temp-sensors.c:
      - TEST_BS_NR_OF_TEMP_SENSORS=5u
    :/test_os_freertos_cache_enabled.c:
      - OS_ENABLE_CACHE=true
    :/test_os_freertos_cache_disabled.c:
      - OS_ENABLE_CACHE=false
    :/test_main_ethernet_uart.c:
      - FOXBMS_TCP_SUPPORT=1
      - FOXBMS_UART_SUPPORT=1
    :/test_emac.c:
      - FOXBMS_TCP_SUPPORT=1
      - FOXBMS_UART_SUPPORT=1
    :/test_uart.c:
      - FOXBMS_UART_SUPPORT=1
    :/test_ftask_emac.c:
      - FOXBMS_TCP_SUPPORT=1
      - FOXBMS_UART_SUPPORT=1
    :/test_ftask_freertos_afe.c:
      - FOXBMS_AFE_DRIVER_TYPE_NO_FSM=1
    :/test_ftask_freertos_emac_uart.c:
      - FOXBMS_TCP_SUPPORT=1
      - FOXBMS_UART_SUPPORT=1
    :/test_ftask_cfg_afe.c:
      - FOXBMS_AFE_DRIVER_TYPE_NO_FSM=1
    :/test_ftask_cfg_emac.c:
      - FOXBMS_TCP_SUPPORT=1
      - FOXBMS_UART_SUPPORT=1
    :/test_ethernet.c:
      - FOXBMS_TCP_SUPPORT=1
      - FOXBMS_UART_SUPPORT=1
    :/test_NetworkInterface.c:
      - COMPILE_FOR_UNIT_TEST=1
      - FOXBMS_TCP_SUPPORT=1
      - FOXBMS_UART_SUPPORT=1
    :/test_dma_uart.c:
      - FOXBMS_UART_SUPPORT=1
    :/test_dma_nxp.c:
      - FOXBMS_AFE_DRIVER_NXP=1
    :/test_debug_can.c:
      - FOXBMS_AFE_DRIVER_DEBUG_CAN=1u
    :/test_can_cbs_rx_as_honeywell-bas6c-x00.c:
      - FOXBMS_AS_HONEYWELL_BAS6C_X00=1
    :/test_*bender*iso165c*.c:
      - FOXBMS_IMD_BENDER_ISO165C=1
    :/test_can_cbs_rx_cs_lem-cab500.c:
      - FOXBMS_CS_LEM_CAB500=1
    :/test_can_cbs_rx_cs_isabellenhuette-ivt-s.c:
      - FOXBMS_CS_ISABELLENHUETTE_IVT_S=1
  :preprocess:
    <<: *config-test-defines
    :*:
      - *match-all-tests
      - INC_FREERTOS_H

:flags:
  :test:
    :compile:
      :*:
        - -std=c11
        - -Wextra
        - -Wall
        - -pedantic
        - -include
        - test_ignore_list.h
        - -Werror
      :/test_timer.c:
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/os/*:
        # This is needed since FreeRTOS V11.1.0. We need the definition of
        # configNUMBER_OF_CORES in FreeRTOSConfig.h in os related modules.
        # See tests/unit/app/task/os/freertos/test_os_freertos.c
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_emac.c:
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_ethernet.c:
        # Add this for the NetworkInterface include
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_ethernet_freertos.c:
        # Add this for the NetworkInterface include
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_dma.c:
        # We need the definition of vTaskSwitchContext
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_dma_uart.c:
        # We need the definition of vTaskSwitchContext
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_dma_nxp.c:
        # We need the definition of vTaskSwitchContext
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_dma_dma_group_a_notification.c:
        # We need the definition of vTaskSwitchContext
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_ftask_cfg_emac.c:
        # We need the definition of vTaskSwitchContext
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_ftask_emac.c:
        # We need the definition of vTaskSwitchContext
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h
      :/test_main_ethernet_uart.c:
        # Add this for the NetworkInterface include
        - -I
        - "../../src/os/freertos/freertos/include"
        - -include
        - FreeRTOSConfig.h

:cmock:
  :includes:
    - "FreeRTOSConfig.h"
    - "FreeRTOS.h"
    - "portmacro.h"
    - "mpu_wrappers.h"
    - "portable.h"
    - "task.h"
    - "queue.h"
    - "semphr.h"
    - "stream_buffer.h"
    - "event_groups.h"
  :plugins:
    - :callback
    - :return_thru_ptr
  :verbosity: 2
  :when_no_prototypes: :warn
  :mock_path: "./mocks"
  :skeleton_path: ""
  :mock_prefix: "Mock"
  :mock_suffix: ""
  :strippables:
    [
      "(.FREERTOS_SYSTEM_CALL)",
      "(.PRIVILEGED_FUNCTION)",
      "(portDONT_DISCARD)",
      "(?:TEST_LTC_DECLARE_GET\\s*\\(+.*?\\)+)",
      "(?:TEST_LTC_DEFINE_GET\\s*\\(+.*?\\)+)",
    ]
  :attributes:
    - __ramfunc
    - __irq
    - __fiq
    - register
    - extern
  :c_calling_conventions:
    - __stdcall
    - __cdecl
    - __fastcall
  :treat_externs: :include
  :treat_inlines: :exclude
  :unity_helper_path: "../../tests/unit/support/struct_helper.h"
  :treat_as:
    uint8: HEX8
    uint16: HEX16
    uint32: UINT32
    int8: INT8
    bool: UINT8
  :memcmp_if_unknown: true
  :when_ptr: :compare_data
  :weak: ""
  :enforce_strict_ordering: true
  :fail_on_unexpected_calls: true
  :callback_include_count: true
  :callback_after_arg_check: false
  :exclude_setjmp_h: false

:test_runner:
  :cmdline_args: true

:environment: []

:libraries:
  :placement: :end
  :flag: "-l${1}"
  :path_flag: "-L ${1}"
  :system: [m]
  :test: []
  :release: []

:gcov:
  :utilities:
    - gcovr
  :reports:
    - HtmlBasic
    - HtmlDetailed
    - Text
    - Cobertura
  :gcovr:
    :report_root: "../../"
    :report_exclude: ".*vendor.*|.*/build.*|.*test.*|.*tests.*|.*lib.*|.*Test.*|.*src.hal.*|^(?!.*src.os.freertos.freertos-plus.freertos-plus-tcp.source.portable.NetworkInterface.tms570lc435.NetworkInterface.c$).*src.os.*|.*src.app.driver.emac.emac-low-level\\.c|.*src.bootloader.*"
    :exclude_directories: ".*tests.*|^(?!.*src.os.freertos.freertos-plus.freertos-plus-tcp.source.portable.NetworkInterface.tms570lc435.NetworkInterface.c$).*src.os.*|.*/build.*|.*src.app.driver.sbc.fs8x_driver."
    :sort_percentage: TRUE
    :sort_uncovered: FALSE
    :print_summary: TRUE
    :threads: 8
    :keep: FALSE
    :html_artifact_filename: GcovCoverageResults.html
    :html_title: foxBMS 2 App Test Coverage Report
    :html_medium_threshold: 75
    :html_high_threshold: 90
    :html_absolute_paths: FALSE
    :html_encoding: UTF-8
    :merge_mode_function: merge-use-line-min

:command_hooks:
  :pre_build:
    :name: "Generate custom mocks"
    :executable: python
    :arguments:
      - "../../conf/unit/mock.py"
    :logging: TRUE

:tools:
  :test_linker:
    :executable: gcc
    :arguments:
      - ${1}
      - ${5}
      - -o ${2}
      - ${4}
      - -flto
  :gcov_linker:
    :executable: gcc
    :arguments:
      - ${1}
      - ${5}
      - -o ${2}
      - ${4}
      - -lgcov
      - --coverage
      - -flto
